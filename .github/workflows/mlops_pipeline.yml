name: MLOps Pipeline

on:
  push:
    branches: [ master]
  pull_request:
    branches: [ master ]
  workflow_dispatch:    # Allow manual trigger

env:
  DOCKER_IMAGE: heart-disease-api
  DOCKER_TAG: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Run the full ML training pipeline
  # ─────────────────────────────────────────────
  train:
    name: Train & Evaluate Models
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize DVC
        run: |
          dvc init --no-scm || true
          

      - name: Run preprocessing stage
        run: python src/preprocess.py

      - name: Run training stage
        run: python src/train.py

      - name: Run evaluation stage
        run: python src/evaluate.py

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            models/champion_model.pkl
            models/results_summary.json
            models/evaluation.json
          retention-days: 30

      - name: Upload processed data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/
          retention-days: 7

      - name: Display evaluation results
        run: |
          echo "===== Evaluation Results ====="
          cat models/evaluation.json

  # ─────────────────────────────────────────────
  # Job 2: Build & push Docker image
  # ─────────────────────────────────────────────
  docker:
    name: Build & push Docker Image
    runs-on: ubuntu-latest
    needs: train          # Only runs if training passed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: models/

      - name: Download processed data artifacts
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/processed/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Build Docker image
        run: |
          docker build -f Dockerfile.streamlit \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest .


      - name: Save Docker image as tar
        run: |
          docker save -o heart-disease-api.tar ${{ env.DOCKER_IMAGE }}:latest
      
      #  push to Docker Hub:
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: champion-docker-image
          path: heart-disease-api.tar
  