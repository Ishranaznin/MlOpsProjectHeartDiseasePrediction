name: MLOps Pipeline

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main ]
  workflow_dispatch:    # Allow manual trigger

env:
  DOCKER_IMAGE: heart-disease-api
  DOCKER_TAG: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Run the full ML training pipeline
  # ─────────────────────────────────────────────
  train:
    name: Train & Evaluate Models
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize DVC
        run: |
          dvc init --no-scm || true
          # If using remote storage, configure it here:
          # dvc remote add -d myremote s3://my-bucket/dvc
          # dvc remote modify myremote access_key_id ${{ secrets.AWS_ACCESS_KEY }}
          # dvc remote modify myremote secret_access_key ${{ secrets.AWS_SECRET_KEY }}

      - name: Run preprocessing stage
        run: python src/preprocess.py

      - name: Run training stage
        run: python src/train.py

      - name: Run evaluation stage
        run: python src/evaluate.py

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            models/champion_model.pkl
            models/results_summary.json
            models/evaluation.json
          retention-days: 30

      - name: Upload processed data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/
          retention-days: 7

      - name: Display evaluation results
        run: |
          echo "===== Evaluation Results ====="
          cat models/evaluation.json

  # ─────────────────────────────────────────────
  # Job 2: Build & push Docker image
  # ─────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: train          # Only runs if training passed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: models/

      - name: Download processed data artifacts
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/processed/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare deployment files
        run: |
          python src/prepare_deployment.py

      - name: Show deployment contents
        run: |
          ls -R deployment

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} \
            -t ${{ env.DOCKER_IMAGE }}:latest \
            .

      - name: Save Docker image as tar
        run: |
          docker save -o heart-disease-api.tar ${{ env.DOCKER_IMAGE }}:latest
      
      # - name: Test Docker container
      #   run: |
      #     docker run -d \
      #       --name test-container \
      #       -p 8000:8000 \
      #       ${{ env.DOCKER_IMAGE }}:latest
      #     sleep 10
      #     curl --retry 5 --retry-delay 3 http://localhost:8000/health
      #     docker stop test-container

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: champion-docker-image
          path: heart-disease-api.tar
      # Uncomment to push to Docker Hub:
      # - name: Push Docker image
      #   run: |
      #     docker push ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
      #     docker push ${{ env.DOCKER_IMAGE }}:latest

  # ─────────────────────────────────────────────
  # Job 3: Run API tests
  # ─────────────────────────────────────────────
  test:
    name: Run API Tests
    runs-on: ubuntu-latest
    needs: train

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: models/

      - name: Download processed data artifacts
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/processed/

      - name: Run tests
        run: pytest tests/ -v --tb=short
        working-directory: .
