apiVersion: v1
kind: Service
metadata:
  name: heart-disease-service
  labels:
    app: heart-disease-api
spec:
  # NodePort exposes on a static port accessible via minikube IP
  type: NodePort
  selector:
    app: heart-disease-api
  ports:
    - name: http
      protocol: TCP
      port: 80           # Service port (inside cluster)
      targetPort: 8000   # Container port
      nodePort: 30080    # External port on each node (30000-32767)
