apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
data:
  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: Heart Disease MLOps
        folder: MLOps
        type: file
        options:
          path: /etc/grafana/provisioning/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
data:
  predictions.json: |
    {
      "title": "Heart Disease MLOps",
      "uid": "heart-mlops-v1",
      "schemaVersion": 38,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Total Streamlit Predictions",
          "gridPos": {"x": 8, "y": 0, "w": 8, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "streamlit_predictions_total",
            "legendFormat": "UI",
            "datasource": {"type": "prometheus", "uid": "prometheus"}
          }],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "value",
            "graphMode": "area"
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Prediction Rate (per minute)",
          "gridPos": {"x": 0, "y": 4, "w": 24, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "rate(streamlit_predictions_total[1m]) * 60",
              "legendFormat": "Streamlit UI",
              "datasource": {"type": "prometheus", "uid": "prometheus"}
            }
          ]
        }
      ]
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboard.yml
              subPath: dashboard.yml
            - name: dashboard-json       # ← this is the missing piece
              mountPath: /etc/grafana/provisioning/dashboards/predictions.json
              subPath: predictions.json
      volumes:
        - name: datasource
          configMap:
            name: grafana-datasource
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-json
          configMap:
            name: grafana-dashboard-json

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030