apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-server
  namespace: default   # change if your Prometheus is in another namespace
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 1m
      scrape_timeout: 10s

    scrape_configs:
      - job_name: 'heart-disease-api'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'ml-api'
        static_configs:
          - targets: ['host.docker.internal:8000']

          